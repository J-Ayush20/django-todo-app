{% extends "base.html" %}

{% block title %}Edit Todo{% endblock %}

{% block content %}
    <h1>✏️ Edit Task</h1>

    <div class="card">
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_title">Task Title *</label>
                {{ form.title }}
            </div>

            <div class="form-group">
                <label for="id_description">Description</label>
                {{ form.description }}
            </div>

            <div class="form-group">
                <label for="id_due_date">Due Date</label>
                {{ form.due_date }}
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'todo_list' %}" class="btn btn-danger">Cancel</a>
        </form>
    </div>
{% endblock %}
